<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sessn — Post</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Barlow', sans-serif;
    max-width: 430px;
    margin: 0 auto;
  }

  :root {
    --accent: #635BFF;
    --accent-light: #8B85FF;
    --accent-glow: rgba(99, 91, 255, 0.35);
    --accent-soft: rgba(99, 91, 255, 0.12);
    --accent-border: rgba(99, 91, 255, 0.25);
  }

  .story-frame {
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.7) contrast(1.05);
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.3) 0%,
      rgba(0,0,0,0.0) 20%,
      rgba(0,0,0,0.0) 45%,
      rgba(0,0,0,0.45) 65%,
      rgba(0,0,0,0.78) 100%
    );
  }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 28px 28px 36px;
    z-index: 2;
  }

  /* ── Top Bar ── */
  .top-bar {
    position: absolute;
    top: 54px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 3;
  }

  .back-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.2); }
  .back-btn svg { width: 20px; height: 20px; fill: #fff; }

  .sessn-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  /* ── Username Row ── */
  .post-user-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .post-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .post-user-info {}
  .post-username {
    font-size: 14px; font-weight: 700; color: #fff;
  }
  .post-date {
    font-size: 11px; color: rgba(255,255,255,0.5);
  }

  /* ── Location ── */
  .location {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 14px;
    margin-bottom: 14px;
    width: fit-content;
  }
  .location-pin { width: 14px; height: 14px; }
  .location-text {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
  }

  /* ── Workout Title ── */
  .workout-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: #fff;
    line-height: 0.95;
    letter-spacing: 2px;
    margin-bottom: 24px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  /* ── Stats Row ── */
  .stats-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
  }

  .stat-block { flex: 1; }

  .stat-block.heatmap-block {
    flex: 1.2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .stat-label {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    color: #fff;
    line-height: 1;
    letter-spacing: 1px;
  }

  .heatmap-container {
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }

  .heatmap-figure {
    width: 40px;
    height: 96px;
  }

  /* ── Bottom Actions ── */
  .bottom-actions {
    display: flex; align-items: center; gap: 20px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .action-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.6);
    cursor: pointer; background: none; border: none;
    font-family: 'Barlow', sans-serif;
    transition: color 0.2s;
  }
  .action-btn:hover { color: #fff; }
  .action-btn svg { width: 22px; height: 22px; fill: currentColor; }
  .action-btn.liked { color: #FF4D6A; }
  .action-btn.liked svg { fill: #FF4D6A; }

  .action-spacer { flex: 1; }

  .save-btn {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Barlow', sans-serif;
    font-size: 12px; font-weight: 700;
    color: #fff; background: var(--accent);
    border: none; border-radius: 10px;
    padding: 8px 16px; cursor: pointer;
    box-shadow: 0 2px 12px var(--accent-glow);
    transition: background 0.2s, transform 0.15s;
  }
  .save-btn:hover { background: var(--accent-light); }
  .save-btn:active { transform: scale(0.96); }
  .save-btn svg { width: 14px; height: 14px; fill: #fff; }

  @media (min-width: 500px) {
    body {
      border-left: 3px solid rgba(255,255,255,0.08);
      border-right: 3px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 80px rgba(0,0,0,0.5);
    }
  }
</style>
</head>
<body>

<div class="story-frame">
  <img class="bg-photo" src="Images/pull-day.jpg" alt="Wednesday Pull Day" style="object-position: center 55%;" />
  <div class="overlay"></div>

  <!-- Top Bar -->
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </button>
    <div class="sessn-logo">SESSN</div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- User Row -->
    <div class="post-user-row">
      <div class="post-avatar">B</div>
      <div class="post-user-info">
        <div class="post-username">bradyepstein</div>
        <div class="post-date">5/24/25</div>
      </div>
    </div>

    <!-- Location -->
    <div class="location">
      <svg class="location-pin" viewBox="0 0 16 16" fill="none">
        <path d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 7a2 2 0 110-4 2 2 0 010 4z" fill="rgba(255,255,255,0.85)"/>
      </svg>
      <span class="location-text">Wells Ave YMCA</span>
    </div>

    <!-- Title -->
    <div class="workout-title">Wednesday<br/>Pull Day</div>

    <!-- Stats Row -->
    <div class="stats-row">

      <!-- Column 1: Heatmap -->
      <div class="stat-block heatmap-block">
        <div class="stat-label">Muscles</div>
        <div class="heatmap-container">

          <!-- Front Body -->
          <svg class="heatmap-figure" viewBox="0 0 100 230" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="50" cy="14" rx="9" ry="10" fill="rgba(255,255,255,0.15)"/>
            <path d="M44 24 Q44 22 47 22 L53 22 Q56 22 56 24 L56 30 L44 30 Z" fill="rgba(255,255,255,0.12)"/>
            <path d="M33 32 Q22 34 18 44 Q17 48 19 50 L28 48 L33 38 Z" fill="rgba(255,255,255,0.15)"/>
            <path d="M67 32 Q78 34 82 44 Q83 48 81 50 L72 48 L67 38 Z" fill="rgba(255,255,255,0.15)"/>
            <path d="M33 34 Q40 31 50 32 L50 50 Q42 52 33 48 Z" fill="rgba(255,255,255,0.13)"/>
            <path d="M67 34 Q60 31 50 32 L50 50 Q58 52 67 48 Z" fill="rgba(255,255,255,0.13)"/>
            <path d="M19 50 Q17 56 17 64 Q17 72 20 74 L27 72 L28 48 Z" fill="#E84855" opacity="0.85"/>
            <path d="M81 50 Q83 56 83 64 Q83 72 80 74 L73 72 L72 48 Z" fill="#E84855" opacity="0.85"/>
            <path d="M20 76 Q18 84 16 94 Q15 98 17 99 L24 97 L27 74 Z" fill="rgba(255,255,255,0.10)"/>
            <path d="M80 76 Q82 84 84 94 Q85 98 83 99 L76 97 L73 74 Z" fill="rgba(255,255,255,0.10)"/>
            <path d="M37 52 L37 88 Q37 92 42 94 L50 96 L58 94 Q63 92 63 88 L63 52 Q58 54 50 54 Q42 54 37 52 Z" fill="rgba(255,255,255,0.10)"/>
            <path d="M36 98 Q34 118 34 138 Q34 148 37 150 L46 148 Q48 130 48 112 L48 98 Z" fill="rgba(255,255,255,0.13)"/>
            <path d="M64 98 Q66 118 66 138 Q66 148 63 150 L54 148 Q52 130 52 112 L52 98 Z" fill="rgba(255,255,255,0.13)"/>
            <path d="M37 154 Q36 170 36 182 Q36 190 38 192 L46 190 Q46 174 46 154 Z" fill="rgba(255,255,255,0.08)"/>
            <path d="M63 154 Q64 170 64 182 Q64 190 62 192 L54 190 Q54 174 54 154 Z" fill="rgba(255,255,255,0.08)"/>
            <ellipse cx="42" cy="196" rx="7" ry="3" fill="rgba(255,255,255,0.06)"/>
            <ellipse cx="58" cy="196" rx="7" ry="3" fill="rgba(255,255,255,0.06)"/>
          </svg>

          <!-- Back Body -->
          <svg class="heatmap-figure" viewBox="0 0 100 230" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="50" cy="14" rx="9" ry="10" fill="rgba(255,255,255,0.15)"/>
            <path d="M45 24 L55 24 L55 30 L45 30 Z" fill="rgba(255,255,255,0.12)"/>
            <path d="M30 28 L70 28 L68 36 L32 36 Z" fill="#E84855" opacity="0.78"/>
            <path d="M30 29 L16 40 L15 47 L24 45 L30 36 Z" fill="#E84855" opacity="0.72"/>
            <path d="M70 29 L84 40 L85 47 L76 45 L70 36 Z" fill="#E84855" opacity="0.72"/>
            <path d="M30 36 L70 36 L66 56 L34 56 Z" fill="#E84855" opacity="0.82"/>
            <path d="M34 56 L66 56 L56 80 L44 80 Z" fill="#FF3344" opacity="0.72"/>
            <path d="M44 80 L56 80 L54 98 L46 98 Z" fill="#E84855" opacity="0.55"/>
            <path d="M15 48 L13 64 L15 72 L23 70 L24 46 Z" fill="rgba(255,255,255,0.13)"/>
            <path d="M85 48 L87 64 L85 72 L77 70 L76 46 Z" fill="rgba(255,255,255,0.13)"/>
            <path d="M15 74 L12 92 L13 97 L20 95 L23 72 Z" fill="rgba(255,255,255,0.10)"/>
            <path d="M85 74 L88 92 L87 97 L80 95 L77 72 Z" fill="rgba(255,255,255,0.10)"/>
            <path d="M44 100 L56 100 L55 112 L45 112 Z" fill="rgba(255,255,255,0.10)"/>
            <path d="M40 114 L48 114 L48 152 L40 154 Z" fill="rgba(255,255,255,0.12)"/>
            <path d="M52 114 L60 114 L60 154 L52 152 Z" fill="rgba(255,255,255,0.12)"/>
            <path d="M41 158 L47 158 L47 190 L41 192 Z" fill="rgba(255,255,255,0.08)"/>
            <path d="M53 158 L59 158 L59 192 L53 190 Z" fill="rgba(255,255,255,0.08)"/>
            <ellipse cx="44" cy="196" rx="6" ry="3" fill="rgba(255,255,255,0.06)"/>
            <ellipse cx="56" cy="196" rx="6" ry="3" fill="rgba(255,255,255,0.06)"/>
          </svg>

        </div>
      </div>

      <!-- Column 2: Workout type -->
      <div class="stat-block">
        <div class="stat-label">Workout</div>
        <div class="stat-value" style="font-size: 36px;">Back<br/>& Bis</div>
      </div>

      <!-- Column 3: Date stacked above Time -->
      <div class="stat-block">
        <div class="stat-label">Date</div>
        <div class="stat-value" style="font-size: 32px;">5/24/25</div>
        <div style="margin-top: 16px;">
          <div class="stat-label">Time</div>
          <div class="stat-value">55<span style="font-size: 24px; opacity: 0.7;">min</span></div>
        </div>
      </div>

    </div>

    <!-- Bottom Actions -->
    <div class="bottom-actions">
      <button class="action-btn liked" onclick="toggleLike(this)">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <span>31</span>
      </button>
      <button class="action-btn" onclick="toggleAction(this)">
        <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        <span>5</span>
      </button>
      <div class="action-spacer"></div>
      <button class="save-btn" onclick="toggleSave(this)">
        <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/></svg>
        Save
      </button>
    </div>

  </div>
</div>

<script>
  function toggleLike(btn) {
    btn.classList.toggle('liked');
    const span = btn.querySelector('span');
    let count = parseInt(span.textContent);
    if (btn.classList.contains('liked')) {
      count++;
      btn.querySelector('svg').innerHTML = '<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>';
    } else {
      count--;
      btn.querySelector('svg').innerHTML = '<path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/>';
    }
    span.textContent = count;
  }

  function toggleAction(btn) {
    btn.classList.toggle('active');
    btn.style.color = btn.classList.contains('active') ? 'var(--accent-light)' : '';
  }

  function toggleSave(btn) {
    btn.classList.toggle('saved');
    if (btn.classList.contains('saved')) {
      btn.style.background = 'transparent';
      btn.style.border = '1px solid var(--accent-border)';
      btn.style.color = 'var(--accent-light)';
      btn.style.boxShadow = 'none';
      btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:var(--accent-light)"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg> Saved';
    } else {
      btn.style.background = '';
      btn.style.border = '';
      btn.style.color = '';
      btn.style.boxShadow = '';
      btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:#fff"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2zm0 15l-5-2.18L7 18V5h10v13z"/></svg> Save';
    }
  }
</script>

</body>
</html>
