<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sessn — New Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0a0a;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    :root {
      --accent: #635BFF;
      --accent-light: #8B85FF;
      --accent-glow: rgba(99, 91, 255, 0.35);
      --accent-soft: rgba(99, 91, 255, 0.12);
      --accent-border: rgba(99, 91, 255, 0.25);
      --card-bg: #151515;
      --card-border: rgba(255,255,255,0.06);
    }

    /* ── Status Bar ── */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px 0; font-size: 12px; font-weight: 600;
    }
    .status-time { font-size: 15px; font-weight: 700; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 16px; height: 16px; fill: #fff; }

    /* ── Top Header ── */
    .top-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 8px;
    }
    .close-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
      border: none;
    }
    .close-btn:hover { background: rgba(255,255,255,0.1); }
    .close-btn svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.7); }
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 2px;
    }
    .header-spacer { width: 40px; }

    /* ── Step Indicator ── */
    .step-indicator {
      display: flex; gap: 4px;
      padding: 8px 20px 16px;
    }
    .step-dot {
      flex: 1; height: 3px;
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
    }
    .step-dot.done { background: var(--accent); }
    .step-dot.active { background: var(--accent-light); }

    /* ── Section Label ── */
    .section-label {
      padding: 12px 20px 8px;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.3);
    }
    .section-title {
      padding: 0 20px 4px;
      font-size: 22px; font-weight: 700;
    }
    .section-subtitle {
      padding: 0 20px 20px;
      font-size: 13px; color: rgba(255,255,255,0.45);
    }

    /* ── Workout Type Grid ── */
    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      padding: 0 16px 24px;
    }
    .type-card {
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 16px;
      padding: 18px 12px;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .type-card:active { transform: scale(0.96); }
    .type-card:hover { border-color: rgba(255,255,255,0.12); }
    .type-card.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .type-emoji { font-size: 28px; }
    .type-name {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      text-align: center;
    }
    .type-desc {
      font-size: 10px; color: rgba(255,255,255,0.35);
      text-align: center;
    }

    /* Color accents per type */
    .type-card[data-type="lifting"].selected { border-color: #5B8CFF; background: rgba(91,140,255,0.1); }
    .type-card[data-type="cardio"].selected { border-color: #5BDB6D; background: rgba(91,219,109,0.1); }
    .type-card[data-type="sports"].selected { border-color: #FFB85B; background: rgba(255,184,91,0.1); }
    .type-card[data-type="crossfit"].selected { border-color: #FF8BA7; background: rgba(255,139,167,0.1); }
    .type-card[data-type="yoga"].selected { border-color: #E85BFF; background: rgba(232,91,255,0.1); }
    .type-card[data-type="recovery"].selected { border-color: #5BE8D5; background: rgba(91,232,213,0.1); }

    .type-card[data-type="lifting"] .type-name { color: #5B8CFF; }
    .type-card[data-type="cardio"] .type-name { color: #5BDB6D; }
    .type-card[data-type="sports"] .type-name { color: #FFB85B; }
    .type-card[data-type="crossfit"] .type-name { color: #FF8BA7; }
    .type-card[data-type="yoga"] .type-name { color: #E85BFF; }
    .type-card[data-type="recovery"] .type-name { color: #5BE8D5; }

    .type-card:not(.selected) .type-name { color: rgba(255,255,255,0.6); }

    /* ── Independent / Class Toggle ── */
    .toggle-row {
      display: flex; gap: 0;
      margin: 0 16px 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
    }
    .toggle-option {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      font-size: 14px; font-weight: 600;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.2s;
      border: none; background: none;
      font-family: 'Barlow', sans-serif;
    }
    .toggle-option.active {
      background: var(--accent);
      color: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    /* ── Form Fields ── */
    .form-fields {
      padding: 0 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .field-group {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 14px 16px;
      transition: border-color 0.2s;
    }
    .field-group:focus-within {
      border-color: var(--accent-border);
    }
    .field-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 6px;
    }
    .field-input {
      width: 100%;
      background: none; border: none; outline: none;
      font-family: 'Barlow', sans-serif;
      font-size: 15px; font-weight: 500;
      color: #fff;
    }
    .field-input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    /* ── Photo Upload ── */
    .photo-upload {
      margin: 0 16px 12px;
      background: var(--card-bg);
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 32px 16px;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .photo-upload:hover { border-color: var(--accent-border); }
    .photo-upload svg { width: 36px; height: 36px; fill: rgba(255,255,255,0.2); }
    .photo-upload-text {
      font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.4);
    }
    .photo-upload-hint {
      font-size: 11px; color: rgba(255,255,255,0.2);
    }

    /* ── Next Button ── */
    .next-btn-container {
      padding: 24px 16px 120px;
    }
    .next-btn {
      width: 100%;
      padding: 14px 0;
      border-radius: 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px; font-weight: 700;
      text-align: center;
      cursor: pointer;
      border: none;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .next-btn:hover { background: var(--accent-light); }
    .next-btn:active { transform: scale(0.98); }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 12px 28px; z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 6px 12px; transition: color 0.2s;
    }
    .nav-item svg { width: 24px; height: 24px; fill: rgba(255,255,255,0.35); }
    .nav-item span { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 500; }
    .nav-item.active svg { fill: var(--accent-light); }
    .nav-item.active span { color: var(--accent-light); }
    .nav-add {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin-top: -24px; cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 3px solid var(--accent-light);
    }
    .nav-add svg { width: 28px; height: 28px; fill: #fff; }

    ::-webkit-scrollbar { width: 0; }

    @media (min-width: 500px) {
      body {
        border-left: 3px solid rgba(255,255,255,0.08);
        border-right: 3px solid rgba(255,255,255,0.08);
        box-shadow: 0 0 80px rgba(0,0,0,0.5);
      }
    }
  </style>
</head>
<body>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.34C7 21.4 7.6 22 8.33 22h7.34c.73 0 1.33-.6 1.33-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- Top Header -->
  <div class="top-header">
    <button class="close-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
    <div class="header-title">NEW POST</div>
    <div class="header-spacer"></div>
  </div>

  <!-- Step Indicator (Step 1 of 7) -->
  <div class="step-indicator">
    <div class="step-dot active"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
  </div>

  <!-- Step 1: Select Workout Type -->
  <div class="section-label">Step 1</div>
  <div class="section-title">Select Workout Type</div>
  <div class="section-subtitle">Choose one or more that apply to your sessn.</div>

  <div class="type-grid">
    <div class="type-card selected" data-type="lifting" onclick="toggleType(this)">
      <div class="type-emoji">&#127947;</div>
      <div class="type-name">Lifting</div>
    </div>
    <div class="type-card" data-type="cardio" onclick="toggleType(this)">
      <div class="type-emoji">&#127939;</div>
      <div class="type-name">Cardio</div>
    </div>
    <div class="type-card" data-type="sports" onclick="toggleType(this)">
      <div class="type-emoji">&#9917;</div>
      <div class="type-name">Sports</div>
    </div>
    <div class="type-card" data-type="crossfit" onclick="toggleType(this)">
      <div class="type-emoji">&#128293;</div>
      <div class="type-name">CrossFit</div>
    </div>
    <div class="type-card" data-type="yoga" onclick="toggleType(this)">
      <div class="type-emoji">🧘</div>
      <div class="type-name">Yoga</div>
    </div>
    <div class="type-card" data-type="recovery" onclick="toggleType(this)">
      <div class="type-emoji">&#128167;</div>
      <div class="type-name">Recovery</div>
    </div>
  </div>

  <!-- Independent or Class -->
  <div class="section-label">Format</div>
  <div class="toggle-row">
    <button class="toggle-option active" onclick="setToggle(this)">Independent</button>
    <button class="toggle-option" onclick="setToggle(this)">Class</button>
  </div>

  <!-- Form Fields -->
  <div class="form-fields">
    <div class="field-group">
      <div class="field-label">Title</div>
      <input class="field-input" type="text" placeholder="Name your workout...">
    </div>
    <div class="field-group">
      <div class="field-label">Location</div>
      <input class="field-input" type="text" placeholder="Where did you work out?">
    </div>
    <div class="field-group">
      <div class="field-label">Workout Length</div>
      <input class="field-input" type="text" placeholder="e.g. 45 min">
    </div>
  </div>

  <!-- Photo Upload -->
  <div class="section-label" style="margin-top: 8px;">Photo</div>
  <div class="photo-upload">
    <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
    <div class="photo-upload-text">Add a photo</div>
    <div class="photo-upload-hint">Tap to upload from camera roll</div>
  </div>

  <!-- Next Button -->
  <div class="next-btn-container">
    <button class="next-btn">Next — Workout Details</button>
  </div>

  <!-- Bottom Navigation — Plus highlighted -->
  <div class="bottom-nav">
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>Search</span>
    </div>
    <div class="nav-add">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span>Friends</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>Profile</span>
    </div>
  </div>

  <script>
    function toggleType(card) {
      card.classList.toggle('selected');
    }

    function setToggle(btn) {
      document.querySelectorAll('.toggle-option').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
