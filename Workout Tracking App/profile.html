<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sessn — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0a0a;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    :root {
      --accent: #635BFF;
      --accent-light: #8B85FF;
      --accent-glow: rgba(99, 91, 255, 0.35);
      --accent-soft: rgba(99, 91, 255, 0.12);
      --accent-border: rgba(99, 91, 255, 0.25);
      --card-bg: #151515;
      --card-border: rgba(255,255,255,0.06);
    }

    /* ── Status Bar ── */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px 0; font-size: 12px; font-weight: 600;
    }
    .status-time { font-size: 15px; font-weight: 700; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 16px; height: 16px; fill: #fff; }

    /* ── Profile Header ── */
    .profile-header {
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 20px 0;
    }
    .profile-pic {
      width: 96px; height: 96px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px; letter-spacing: 1px; color: #fff;
      border: 3px solid var(--accent-border);
      box-shadow: 0 4px 24px var(--accent-glow);
    }
    .profile-username {
      margin-top: 14px;
      font-size: 20px; font-weight: 700;
    }
    .profile-realname {
      margin-top: 2px;
      font-size: 14px; color: rgba(255,255,255,0.5);
      font-weight: 500;
    }
    .profile-bio {
      margin-top: 10px;
      font-size: 13px; color: rgba(255,255,255,0.55);
      text-align: center; line-height: 1.5;
      max-width: 300px;
    }

    /* ── Action Buttons ── */
    .profile-actions {
      display: flex; gap: 10px;
      padding: 18px 20px 0;
      width: 100%;
    }
    .profile-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 12px;
      font-family: 'Barlow', sans-serif;
      font-size: 13px; font-weight: 700;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .profile-btn.primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .profile-btn.primary:hover {
      background: var(--accent-light);
    }
    .profile-btn.secondary {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      border: 1px solid var(--card-border);
    }
    .profile-btn.secondary:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    /* ── Stats Row ── */
    .profile-stats {
      display: flex;
      width: 100%;
      padding: 22px 20px 0;
    }
    .profile-stat {
      flex: 1;
      text-align: center;
      cursor: pointer;
    }
    .profile-stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 0.5px;
    }
    .profile-stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* ── Content Tabs ── */
    .profile-tabs {
      display: flex;
      margin: 20px 16px 0;
      border-bottom: 1px solid var(--card-border);
    }
    .profile-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .profile-tab:hover { color: rgba(255,255,255,0.6); }
    .profile-tab.active { color: var(--accent-light); }
    .profile-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 20%; right: 20%;
      height: 2px;
      background: var(--accent-light);
      border-radius: 2px;
    }
    .profile-tab svg {
      width: 20px; height: 20px;
      fill: currentColor;
      vertical-align: middle;
    }

    /* ── Posts Grid (Instagram style) ── */
    .posts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2px;
      padding: 2px 0 120px;
    }
    .grid-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
    }
    .grid-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: opacity 0.2s;
    }
    .grid-item:active img { opacity: 0.7; }
    .grid-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 8px;
      pointer-events: none;
    }
    .grid-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px; letter-spacing: 0.8px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }
    .grid-meta {
      font-size: 10px; color: rgba(255,255,255,0.6);
      display: flex; align-items: center; gap: 4px;
    }
    .grid-meta svg { width: 10px; height: 10px; fill: #FF4D6A; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 12px 28px; z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 6px 12px; transition: color 0.2s;
    }
    .nav-item svg { width: 24px; height: 24px; fill: rgba(255,255,255,0.35); }
    .nav-item span { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 500; }
    .nav-item.active svg { fill: var(--accent-light); }
    .nav-item.active span { color: var(--accent-light); }
    .nav-add {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin-top: -24px; cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .nav-add:hover { transform: scale(1.08); box-shadow: 0 6px 28px var(--accent-glow); }
    .nav-add svg { width: 28px; height: 28px; fill: #fff; }

    ::-webkit-scrollbar { width: 0; }

    @media (min-width: 500px) {
      body {
        border-left: 3px solid rgba(255,255,255,0.08);
        border-right: 3px solid rgba(255,255,255,0.08);
        box-shadow: 0 0 80px rgba(0,0,0,0.5);
      }
    }
  </style>
</head>
<body>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-time">9:41</div>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.34C7 21.4 7.6 22 8.33 22h7.34c.73 0 1.33-.6 1.33-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- SESSN Logo -->
  <div style="padding: 18px 20px 0; text-align: center;">
    <span style="font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 4px; background: linear-gradient(135deg, var(--accent-light), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">SESSN</span>
  </div>

  <!-- Profile Header -->
  <div class="profile-header">
    <div class="profile-pic">BE</div>
    <div class="profile-username">bradyepstein</div>
    <div class="profile-realname">Brady Epstein</div>
    <div class="profile-bio">Gym rat. No days off. Tracking every sessn.</div>
  </div>

  <!-- Action Buttons -->
  <div class="profile-actions">
    <button class="profile-btn primary">Edit Profile</button>
    <button class="profile-btn secondary">Share Profile</button>
  </div>

  <!-- Stats -->
  <div class="profile-stats">
    <div class="profile-stat">
      <div class="profile-stat-value">2</div>
      <div class="profile-stat-label">Posts</div>
    </div>
    <div class="profile-stat">
      <div class="profile-stat-value">248</div>
      <div class="profile-stat-label">Followers</div>
    </div>
    <div class="profile-stat">
      <div class="profile-stat-value">186</div>
      <div class="profile-stat-label">Following</div>
    </div>
  </div>

  <!-- Content Tabs -->
  <div class="profile-tabs">
    <div class="profile-tab active" onclick="setTab(this)">
      <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
      Posts
    </div>
    <div class="profile-tab" onclick="setTab(this)">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      Group
    </div>
    <div class="profile-tab" onclick="setTab(this)">
      <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      Reposts
    </div>
  </div>

  <!-- Posts Grid -->
  <div class="posts-grid">
    <div class="grid-item">
      <img src="Images/post-thanksgiving.jpg" alt="Post Thanksgiving Workout" style="object-position: center 30%;">
      <div class="grid-overlay">
        <div class="grid-title">CHEST & TRIS</div>
        <div class="grid-meta">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          24
        </div>
      </div>
    </div>
    <div class="grid-item">
      <img src="Images/pull-day.jpg" alt="Wednesday Pull Day" style="object-position: center 55%;">
      <div class="grid-overlay">
        <div class="grid-title">BACK & BIS</div>
        <div class="grid-meta">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          31
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Navigation — Profile is active -->
  <div class="bottom-nav">
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>Search</span>
    </div>
    <div class="nav-add">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span>Friends</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>Profile</span>
    </div>
  </div>

  <script>
    function setTab(el) {
      document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    function toggleLike(btn) {
      btn.classList.toggle('liked');
      const span = btn.querySelector('span');
      let count = parseInt(span.textContent);
      if (btn.classList.contains('liked')) {
        count++;
        btn.querySelector('svg').innerHTML = '<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>';
      } else {
        count--;
        btn.querySelector('svg').innerHTML = '<path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/>';
      }
      span.textContent = count;
    }

    function toggleAction(btn) {
      btn.classList.toggle('active');
      btn.style.color = btn.classList.contains('active') ? 'var(--accent-light)' : '';
    }
  </script>

</body>
</html>
