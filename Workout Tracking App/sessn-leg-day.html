<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessn Story Export</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Barlow', sans-serif;
  }

  .story-frame {
    width: 390px;
    height: 844px;
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    background: #000;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.7) contrast(1.05);
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.0) 25%,
      rgba(0,0,0,0.0) 45%,
      rgba(0,0,0,0.45) 68%,
      rgba(0,0,0,0.72) 100%
    );
  }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 28px 28px 36px;
    z-index: 2;
  }

  .top-bar {
    position: absolute;
    top: 24px;
    left: 28px;
    right: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 3;
  }

  .barbell-icon { width: 44px; height: 44px; }

  .sessn-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  .location {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 14px;
    margin-bottom: 14px;
    width: fit-content;
  }

  .location-pin { width: 14px; height: 14px; }
  .location-text {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
  }

  .workout-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: #fff;
    line-height: 0.95;
    letter-spacing: 2px;
    margin-bottom: 24px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  .stats-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
  }

  .stat-block { flex: 1; }

  .stat-block.heatmap-block {
    flex: 1.2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .stat-label {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    color: #fff;
    line-height: 1;
    letter-spacing: 1px;
  }

  .heatmap-container {
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }

  .heatmap-figure {
    width: 40px;
    height: 96px;
  }

  .streak-badge {
    position: absolute;
    top: 80px;
    right: 28px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,120,30,0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,120,30,0.3);
    border-radius: 16px;
    padding: 6px 12px;
    z-index: 3;
  }

  .streak-flame { font-size: 16px; }
  .streak-text {
    font-size: 13px;
    font-weight: 600;
    color: #FF8C42;
    letter-spacing: 0.5px;
  }

  .watermark {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.25);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="story-frame">
  <img class="bg-photo" id="bgPhoto" src="" alt="workout photo" />
  <div class="overlay"></div>

  <div class="top-bar">
    <svg class="barbell-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="16" width="6" height="16" rx="2" fill="white" opacity="0.9"/>
      <rect x="8" y="13" width="5" height="22" rx="1.5" fill="white" opacity="0.9"/>
      <rect x="13" y="22" width="22" height="4" rx="2" fill="white" opacity="0.9"/>
      <rect x="35" y="13" width="5" height="22" rx="1.5" fill="white" opacity="0.9"/>
      <rect x="40" y="16" width="6" height="16" rx="2" fill="white" opacity="0.9"/>
    </svg>
    <div class="sessn-logo">SESSN</div>
  </div>

  <div class="streak-badge">
    <span class="streak-flame">🔥</span>
    <span class="streak-text">12 day streak</span>
  </div>

  <div class="content">
    <div class="location">
      <svg class="location-pin" viewBox="0 0 16 16" fill="none">
        <path d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 7a2 2 0 110-4 2 2 0 010 4z" fill="rgba(255,255,255,0.85)"/>
      </svg>
      <span class="location-text">Nic Rec Center</span>
    </div>

    <div class="workout-title">Friday<br/>Leg Day</div>

    <!-- Stats: 3 columns — Muscles | Workout | Date stacked over Time -->
    <div class="stats-row">

      <!-- Column 1: Heatmap -->
      <div class="stat-block heatmap-block">
        <div class="stat-label">Muscles</div>
        <div class="heatmap-container">

          <!-- ========== FRONT BODY — FEMALE (Quads highlighted) ========== -->
          <svg class="heatmap-figure" viewBox="0 0 100 230" xmlns="http://www.w3.org/2000/svg">
            <!-- Head -->
            <ellipse cx="50" cy="14" rx="9" ry="10" fill="rgba(255,255,255,0.15)"/>
            <!-- Neck (slimmer) -->
            <path d="M46 24 L54 24 L54 30 L46 30 Z" fill="rgba(255,255,255,0.12)"/>
            <!-- L Delt (narrower) -->
            <path d="M37 32 Q28 34 24 42 Q23 46 25 48 L32 46 L37 37 Z" fill="rgba(255,255,255,0.15)"/>

            <!-- R Chest -->
            <path d="M63 34 Q58 31 50 32 L50 48 Q56 50 63 46 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- L Arm -->
            <path d="M25 49 Q23 56 23 64 Q23 70 25 72 L31 70 L32 47 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- R Arm -->
            <path d="M75 49 Q77 56 77 64 Q77 70 75 72 L69 70 L68 47 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- L Forearm -->
            <path d="M25 74 Q23 82 22 90 Q21 94 23 95 L28 93 L31 72 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- R Forearm -->
            <path d="M75 74 Q77 82 78 90 Q79 94 77 95 L72 93 L69 72 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- Core (cinched waist) -->
            <path d="M40 50 L40 72 Q40 78 44 82 L50 84 L56 82 Q60 78 60 72 L60 50 Q56 52 50 52 Q44 52 40 50 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- Hips (wider than waist) -->
            <path d="M38 84 Q34 88 33 94 L50 98 L67 94 Q66 88 62 84 Z" fill="rgba(255,255,255,0.08)"/>
            <!-- L Quad — HIGHLIGHTED -->
            <path d="M33 98 Q32 116 32 134 Q32 144 35 148 L46 146 Q47 128 47 110 L47 98 Z" fill="#E84855" opacity="0.85"/>
            <!-- R Quad — HIGHLIGHTED -->
            <path d="M67 98 Q68 116 68 134 Q68 144 65 148 L54 146 Q53 128 53 110 L53 98 Z" fill="#E84855" opacity="0.85"/>
            <!-- L Shin -->
            <path d="M36 152 Q35 168 35 180 Q35 188 37 190 L45 188 Q45 172 45 152 Z" fill="rgba(255,255,255,0.08)"/>
            <!-- R Shin -->
            <path d="M64 152 Q65 168 65 180 Q65 188 63 190 L55 188 Q55 172 55 152 Z" fill="rgba(255,255,255,0.08)"/>
            <!-- Feet -->
            <ellipse cx="41" cy="194" rx="6" ry="3" fill="rgba(255,255,255,0.06)"/>
            <ellipse cx="59" cy="194" rx="6" ry="3" fill="rgba(255,255,255,0.06)"/>
          </svg>

          <!-- ========== BACK BODY — FEMALE (Glutes highlighted) ========== -->
          <svg class="heatmap-figure" viewBox="0 0 100 230" xmlns="http://www.w3.org/2000/svg">
            <!-- Head -->
            <ellipse cx="50" cy="14" rx="9" ry="10" fill="rgba(255,255,255,0.15)"/>
            <!-- Neck (slimmer) -->
            <path d="M46 24 L54 24 L54 30 L46 30 Z" fill="rgba(255,255,255,0.12)"/>
            <!-- Traps (narrower) -->
            <path d="M36 28 L64 28 L63 36 L37 36 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- L Rear Delt (narrower) -->
            <path d="M36 29 L22 38 L21 45 L30 43 L36 36 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- R Rear Delt (narrower) -->
            <path d="M64 29 L78 38 L79 45 L70 43 L64 36 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- Upper Back (narrower shoulders) -->
            <path d="M36 36 L64 36 L62 54 L38 54 Z" fill="rgba(255,255,255,0.12)"/>
            <!-- Mid Back (tapering in) -->
            <path d="M38 54 L62 54 L58 72 L42 72 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- Lower Back (narrow waist) -->
            <path d="M42 72 L58 72 L56 86 L44 86 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- L Tricep -->
            <path d="M21 46 L19 62 L21 70 L29 68 L30 44 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- R Tricep -->
            <path d="M79 46 L81 62 L79 70 L71 68 L70 44 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- L Forearm -->
            <path d="M21 72 L18 88 L19 93 L25 91 L29 70 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- R Forearm -->
            <path d="M79 72 L82 88 L81 93 L75 91 L71 70 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- Glutes — HIGHLIGHTED (wider than waist, curvy) -->
            <path d="M40 86 Q34 90 33 98 Q33 104 36 108 L50 112 L64 108 Q67 104 67 98 Q66 90 60 86 Z" fill="#FF3344" opacity="0.85"/>
            <!-- L Hamstring -->
            <path d="M36 114 L47 112 L47 152 L38 154 Z" fill="rgba(255,255,255,0.12)"/>
            <!-- R Hamstring -->
            <path d="M64 114 L53 112 L53 152 L62 154 Z" fill="rgba(255,255,255,0.12)"/>
            <!-- L Calf -->
            <path d="M39 158 L46 158 L46 190 L39 192 Z" fill="rgba(255,255,255,0.08)"/>
            <!-- R Calf -->
            <path d="M54 158 L61 158 L61 192 L54 190 Z" fill="rgba(255,255,255,0.08)"/>
            <!-- Feet -->
            <ellipse cx="43" cy="196" rx="6" ry="3" fill="rgba(255,255,255,0.06)"/>
            <ellipse cx="57" cy="196" rx="6" ry="3" fill="rgba(255,255,255,0.06)"/>
          </svg>

        </div>
      </div>

      <!-- Column 2: Workout type -->
      <div class="stat-block">
        <div class="stat-label">Workout</div>
        <div class="stat-value" style="font-size: 36px;">Quads<br/>and Glutes</div>
      </div>

      <!-- Column 3: Date stacked above Time -->
      <div class="stat-block">
        <div class="stat-label">Date</div>
        <div class="stat-value" style="font-size: 32px;">3/12/26</div>
        <div style="margin-top: 16px;">
          <div class="stat-label">Time</div>
          <div class="stat-value">47<span style="font-size: 24px; opacity: 0.7;">min</span></div>
        </div>
      </div>

    </div>

    <div class="watermark">shared via sessn</div>
  </div>
</div>
