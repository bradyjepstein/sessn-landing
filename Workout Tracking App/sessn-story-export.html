<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessn Story Export</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Barlow', sans-serif;
  }

  .story-frame {
    width: 390px;
    height: 844px;
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    background: #000;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.7) contrast(1.05);
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.0) 25%,
      rgba(0,0,0,0.0) 45%,
      rgba(0,0,0,0.45) 68%,
      rgba(0,0,0,0.72) 100%
    );
  }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 28px 28px 36px;
    z-index: 2;
  }

  .top-bar {
    position: absolute;
    top: 24px;
    left: 28px;
    right: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 3;
  }

  .barbell-icon { width: 44px; height: 44px; }

  .sessn-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  .location {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 14px;
    margin-bottom: 14px;
    width: fit-content;
  }

  .location-pin { width: 14px; height: 14px; }
  .location-text {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.5px;
  }

  .workout-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: #fff;
    line-height: 0.95;
    letter-spacing: 2px;
    margin-bottom: 24px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  .stats-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
  }

  .stat-block { flex: 1; }

  .stat-block.heatmap-block {
    flex: 1.2;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .stat-label {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    color: #fff;
    line-height: 1;
    letter-spacing: 1px;
  }

  .heatmap-container {
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }

  .heatmap-figure {
    width: 40px;
    height: 96px;
  }

  .streak-badge {
    position: absolute;
    top: 80px;
    right: 28px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,120,30,0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,120,30,0.3);
    border-radius: 16px;
    padding: 6px 12px;
    z-index: 3;
  }

  .streak-flame { font-size: 16px; }
  .streak-text {
    font-size: 13px;
    font-weight: 600;
    color: #FF8C42;
    letter-spacing: 0.5px;
  }

  .watermark {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.25);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="story-frame">
  <img class="bg-photo" id="bgPhoto" src="" alt="workout photo" />
  <div class="overlay"></div>

  <div class="top-bar">
    <svg class="barbell-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="16" width="6" height="16" rx="2" fill="white" opacity="0.9"/>
      <rect x="8" y="13" width="5" height="22" rx="1.5" fill="white" opacity="0.9"/>
      <rect x="13" y="22" width="22" height="4" rx="2" fill="white" opacity="0.9"/>
      <rect x="35" y="13" width="5" height="22" rx="1.5" fill="white" opacity="0.9"/>
      <rect x="40" y="16" width="6" height="16" rx="2" fill="white" opacity="0.9"/>
    </svg>
    <div class="sessn-logo">SESSN</div>
  </div>

  <div class="streak-badge">
    <span class="streak-flame">🔥</span>
    <span class="streak-text">12 day streak</span>
  </div>

  <div class="content">
    <div class="location">
      <svg class="location-pin" viewBox="0 0 16 16" fill="none">
        <path d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 7a2 2 0 110-4 2 2 0 010 4z" fill="rgba(255,255,255,0.85)"/>
      </svg>
      <span class="location-text">Wells Ave YMCA</span>
    </div>

    <div class="workout-title">Wednesday<br/>Pull Day</div>

    <!-- Stats: 3 columns — Muscles | Workout | Date stacked over Time -->
    <div class="stats-row">

      <!-- Column 1: Heatmap -->
      <div class="stat-block heatmap-block">
        <div class="stat-label">Muscles</div>
        <div class="heatmap-container">

          <!-- ========== FRONT BODY (athletic) ========== -->
          <svg class="heatmap-figure" viewBox="0 0 100 230" xmlns="http://www.w3.org/2000/svg">
            <!-- Head -->
            <ellipse cx="50" cy="14" rx="9" ry="10" fill="rgba(255,255,255,0.15)"/>
            <!-- Neck -->
            <path d="M44 24 Q44 22 47 22 L53 22 Q56 22 56 24 L56 30 L44 30 Z" fill="rgba(255,255,255,0.12)"/>
            <!-- L Delt -->
            <path d="M33 32 Q22 34 18 44 Q17 48 19 50 L28 48 L33 38 Z" fill="rgba(255,255,255,0.15)"/>
            <!-- R Delt -->
            <path d="M67 32 Q78 34 82 44 Q83 48 81 50 L72 48 L67 38 Z" fill="rgba(255,255,255,0.15)"/>
            <!-- L Pec -->
            <path d="M33 34 Q40 31 50 32 L50 50 Q42 52 33 48 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- R Pec -->
            <path d="M67 34 Q60 31 50 32 L50 50 Q58 52 67 48 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- L Bicep — HIGHLIGHTED -->
            <path d="M19 50 Q17 56 17 64 Q17 72 20 74 L27 72 L28 48 Z" fill="#E84855" opacity="0.85"/>
            <!-- R Bicep — HIGHLIGHTED -->
            <path d="M81 50 Q83 56 83 64 Q83 72 80 74 L73 72 L72 48 Z" fill="#E84855" opacity="0.85"/>
            <!-- L Forearm -->
            <path d="M20 76 Q18 84 16 94 Q15 98 17 99 L24 97 L27 74 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- R Forearm -->
            <path d="M80 76 Q82 84 84 94 Q85 98 83 99 L76 97 L73 74 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- Core -->
            <path d="M37 52 L37 88 Q37 92 42 94 L50 96 L58 94 Q63 92 63 88 L63 52 Q58 54 50 54 Q42 54 37 52 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- L Quad -->
            <path d="M36 98 Q34 118 34 138 Q34 148 37 150 L46 148 Q48 130 48 112 L48 98 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- R Quad -->
            <path d="M64 98 Q66 118 66 138 Q66 148 63 150 L54 148 Q52 130 52 112 L52 98 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- L Shin -->
            <path d="M37 154 Q36 170 36 182 Q36 190 38 192 L46 190 Q46 174 46 154 Z" fill="rgba(255,255,255,0.08)"/>
            <!-- R Shin -->
            <path d="M63 154 Q64 170 64 182 Q64 190 62 192 L54 190 Q54 174 54 154 Z" fill="rgba(255,255,255,0.08)"/>
            <!-- Feet -->
            <ellipse cx="42" cy="196" rx="7" ry="3" fill="rgba(255,255,255,0.06)"/>
            <ellipse cx="58" cy="196" rx="7" ry="3" fill="rgba(255,255,255,0.06)"/>
          </svg>

          <!-- ========== BACK BODY (athletic V-taper) ========== -->
          <svg class="heatmap-figure" viewBox="0 0 100 230" xmlns="http://www.w3.org/2000/svg">
            <!-- Head -->
            <ellipse cx="50" cy="14" rx="9" ry="10" fill="rgba(255,255,255,0.15)"/>
            <!-- Neck -->
            <path d="M45 24 L55 24 L55 30 L45 30 Z" fill="rgba(255,255,255,0.12)"/>
            <!-- Traps — HIGHLIGHTED (widest zone) -->
            <path d="M30 28 L70 28 L68 36 L32 36 Z" fill="#E84855" opacity="0.78"/>
            <!-- L Rear Delt — HIGHLIGHTED -->
            <path d="M30 29 L16 40 L15 47 L24 45 L30 36 Z" fill="#E84855" opacity="0.72"/>
            <!-- R Rear Delt — HIGHLIGHTED -->
            <path d="M70 29 L84 40 L85 47 L76 45 L70 36 Z" fill="#E84855" opacity="0.72"/>
            <!-- Upper Back — HIGHLIGHTED (wide, starts tapering) -->
            <path d="M30 36 L70 36 L66 56 L34 56 Z" fill="#E84855" opacity="0.82"/>
            <!-- Lats — HIGHLIGHTED (mid taper) -->
            <path d="M34 56 L66 56 L56 80 L44 80 Z" fill="#FF3344" opacity="0.72"/>
            <!-- Lower Back — HIGHLIGHTED (narrowest) -->
            <path d="M44 80 L56 80 L54 98 L46 98 Z" fill="#E84855" opacity="0.55"/>
            <!-- L Tricep -->
            <path d="M15 48 L13 64 L15 72 L23 70 L24 46 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- R Tricep -->
            <path d="M85 48 L87 64 L85 72 L77 70 L76 46 Z" fill="rgba(255,255,255,0.13)"/>
            <!-- L Forearm -->
            <path d="M15 74 L12 92 L13 97 L20 95 L23 72 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- R Forearm -->
            <path d="M85 74 L88 92 L87 97 L80 95 L77 72 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- Glutes (narrow) -->
            <path d="M44 100 L56 100 L55 112 L45 112 Z" fill="rgba(255,255,255,0.10)"/>
            <!-- L Hamstring -->
            <path d="M40 114 L48 114 L48 152 L40 154 Z" fill="rgba(255,255,255,0.12)"/>
            <!-- R Hamstring -->
            <path d="M52 114 L60 114 L60 154 L52 152 Z" fill="rgba(255,255,255,0.12)"/>
            <!-- L Calf -->
            <path d="M41 158 L47 158 L47 190 L41 192 Z" fill="rgba(255,255,255,0.08)"/>
            <!-- R Calf -->
            <path d="M53 158 L59 158 L59 192 L53 190 Z" fill="rgba(255,255,255,0.08)"/>
            <!-- Feet -->
            <ellipse cx="44" cy="196" rx="6" ry="3" fill="rgba(255,255,255,0.06)"/>
            <ellipse cx="56" cy="196" rx="6" ry="3" fill="rgba(255,255,255,0.06)"/>
          </svg>

        </div>
      </div>

      <!-- Column 2: Workout type -->
      <div class="stat-block">
        <div class="stat-label">Workout</div>
        <div class="stat-value" style="font-size: 36px;">Back<br/>& Bis</div>
      </div>

      <!-- Column 3: Date stacked above Time -->
      <div class="stat-block">
        <div class="stat-label">Date</div>
        <div class="stat-value" style="font-size: 32px;">5/24/25</div>
        <div style="margin-top: 16px;">
          <div class="stat-label">Time</div>
          <div class="stat-value">55<span style="font-size: 24px; opacity: 0.7;">min</span></div>
        </div>
      </div>

    </div>

    <div class="watermark">shared via sessn</div>
  </div>
</div>
