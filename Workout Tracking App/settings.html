<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sessn — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0a0a0a;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    :root {
      --accent: #635BFF;
      --accent-light: #8B85FF;
      --accent-glow: rgba(99, 91, 255, 0.35);
      --accent-soft: rgba(99, 91, 255, 0.12);
      --accent-border: rgba(99, 91, 255, 0.25);
      --card-bg: #151515;
      --card-border: rgba(255,255,255,0.06);
    }

    /* ── Status Bar ── */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px 0; font-size: 12px; font-weight: 600;
    }
    .status-time { font-size: 15px; font-weight: 700; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons svg { width: 16px; height: 16px; fill: #fff; }

    /* ── Top Header ── */
    .top-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 8px;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
      border: none;
    }
    .back-btn:hover { background: rgba(255,255,255,0.1); }
    .back-btn svg { width: 20px; height: 20px; fill: rgba(255,255,255,0.7); }
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px; letter-spacing: 2px;
    }
    .gear-icon {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      display: flex; align-items: center; justify-content: center;
    }
    .gear-icon svg { width: 20px; height: 20px; fill: var(--accent-light); }

    /* ── Settings List ── */
    .settings-section {
      padding: 0 16px;
      margin-bottom: 8px;
    }
    .section-label {
      padding: 20px 4px 10px;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.3);
    }
    .settings-group {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
    }
    .settings-item {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 16px;
      border-bottom: 1px solid var(--card-border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .settings-item:last-child { border-bottom: none; }
    .settings-item:hover { background: rgba(255,255,255,0.03); }
    .settings-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .settings-icon svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.5); }
    .settings-text {
      flex: 1;
      font-size: 15px; font-weight: 500;
      color: rgba(255,255,255,0.85);
    }
    .settings-chevron svg {
      width: 16px; height: 16px;
      fill: rgba(255,255,255,0.2);
    }

    /* ── Danger items ── */
    .settings-item.danger .settings-text { color: #FF4D6A; }
    .settings-item.danger .settings-icon { background: rgba(255, 77, 106, 0.1); }
    .settings-item.danger .settings-icon svg { fill: #FF4D6A; }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 12px 28px; z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; padding: 6px 12px; transition: color 0.2s;
    }
    .nav-item svg { width: 24px; height: 24px; fill: rgba(255,255,255,0.35); }
    .nav-item span { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 500; }
    .nav-item.active svg { fill: var(--accent-light); }
    .nav-item.active span { color: var(--accent-light); }
    .nav-add {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin-top: -24px; cursor: pointer;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .nav-add:hover { transform: scale(1.08); box-shadow: 0 6px 28px var(--accent-glow); }
    .nav-add svg { width: 28px; height: 28px; fill: #fff; }

    .spacer { height: 120px; }

    ::-webkit-scrollbar { width: 0; }

    @media (min-width: 500px) {
      body {
        border-left: 3px solid rgba(255,255,255,0.08);
        border-right: 3px solid rgba(255,255,255,0.08);
        box-shadow: 0 0 80px rgba(0,0,0,0.5);
      }
    }
  </style>
</head>
