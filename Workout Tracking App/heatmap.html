<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sessn — Heatmap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #f4f4f4;
      color: #111;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 3px;
      margin-bottom: 8px;
      color: #111;
    }
    p.subtitle {
      font-size: 12px;
      color: rgba(0,0,0,0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .heatmap-image {
      max-width: 100%;
      width: 380px;
      height: auto;
      /* Strip color → reds/yellows become gray, outlines stay black,
         then lower opacity for the translucent greyish look */
      filter: grayscale(100%) contrast(1.1);
      opacity: 0.55;
    }
  </style>
</head>
<body>

  <h1>MUSCLE HEATMAP</h1>
  <p class="subtitle">Front &amp; Back</p>

  <img class="heatmap-image" src="Images/muscle heat map.png" alt="Muscle Heatmap" />

</body>
</html>
